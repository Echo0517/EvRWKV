JOBS: 4
TEST_ONLY: false
LOG_INTERVAL: 20
TRAIN_BATCH_SIZE: 8
VAL_BATCH_SIZE: 1
START_EPOCH: 0
END_EPOCH: 80
VAL_INTERVAL: 1
MODEL_SANING_INTERVAL: 5
MIX_PRECISION: true
RESUME:
  PATH: ""
  TYPE:  fit
  SET_EPOCH: True
SEED: 2333
IS_CUDA: true
OPTIMIZER: 
  NAME: "Adam"
  LR: 0.00015
  LR_SCHEDULER: "cosine" 
  end_epoch: 80
  weight_decay: 0.0001
LOSS:
  - NAME: normal-light-reconstructed-loss
    WEIGHT: 1
  - NAME: normal-light-perceptual-loss
    WEIGHT: 0.8
  - NAME: ssim_loss
    WEIGHT: 1
  - NAME: ms_ssim_loss
    WEIGHT: 0.5
METRICS:
  - NAME: SSIM
    input_is_linear: false
  - NAME: PSNR
    input_is_linear: false
  - NAME: PSNR_star
    input_is_linear: false
DATASET:
  NAME: get_egsdsd_withNE_dataset
  root: "./DATA/SDSD_dataset/SDSD_outdoor/SDSD_out_release" # file path of dataset
  voxel_grid_channel: 32
  img_height: 260
  img_width: 346
  is_split_event: true
MODEL:
  NAME: egretinex
  IlluNet:
    illumiantion_level: 1
    base_chs: 48
    voxel_grid_channel: 32
    illumiantion_set: [0]
  ImageNet:
    voxel_grid_channel: 32
    base_chs: 48
DEVICES:
  - 0
  

VISUALIZATION:
  folder: ./epoch-best
  tag: 0001
  intermediate_visualization: false